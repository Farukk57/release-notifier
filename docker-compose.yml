# ---- development (builds locally from source) --------------------------------
# Use this if you've cloned the repo and want to make changes.
services:
  release-notifier:
    build: ./app
    container_name: release-notifier
    restart: unless-stopped
    volumes:
      - ./config:/config:ro
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NTFY_URL=${NTFY_URL}
      - NTFY_TOKEN=${NTFY_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - API_KEY=${API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-claude}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OLLAMA_URL=${OLLAMA_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - NOTIFY_PROVIDER=${NOTIFY_PROVIDER:-ntfy}
      - HASS_URL=${HASS_URL:-}
      - HASS_TOKEN=${HASS_TOKEN:-}
      - HASS_NOTIFY_SERVICE=${HASS_NOTIFY_SERVICE:-notify}
    ports:
      - "8080:8080"    # remove this if using a reverse proxy
    # Traefik users: remove the ports block above and add your labels, e.g.:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.release-notifier.rule=Host(`releases.yourdomain.com`)"
    #   - "traefik.http.routers.release-notifier.entrypoints=websecure"
    #   - "traefik.http.routers.release-notifier.tls=true"
    #   - "traefik.http.services.release-notifier.loadbalancer.server.port=8080"
