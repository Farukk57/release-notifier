# ---- production (pulls from Docker Hub) --------------------------------------
# Use this if you just want to run the app without cloning the repo.
#
# Setup:
#   1. Create config/ and data/ directories next to this file
#   2. Copy containers.yml.example to config/containers.yml and edit it
#   3. Copy .env.example to .env and fill in your keys
#   4. docker compose -f docker-compose.hub.yml up -d

services:
  release-notifier:
    image: YOUR_DOCKERHUB_USERNAME/release-notifier:latest
    container_name: release-notifier
    restart: unless-stopped
    volumes:
      - ./config:/config:ro
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NTFY_URL=${NTFY_URL}
      - NTFY_TOKEN=${NTFY_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - API_KEY=${API_KEY:-}
    ports:
      - "8080:8080"    # remove this if using a reverse proxy
    # Traefik users: remove the ports block above and add your labels here
